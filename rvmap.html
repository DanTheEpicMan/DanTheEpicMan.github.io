<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round Valley Campsite — Distance Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #1a1a1f;
    --surface: #24242b;
    --surface2: #2e2e37;
    --border: #3a3a45;
    --text: #e8e6e1;
    --text-dim: #8a8890;
    --accent: #5ba4f5;
    --danger: #f55b5b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 8px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-weight: 700; font-size: 15px; white-space: nowrap; }
  .header-title span { color: var(--accent); }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  button {
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    padding: 6px 12px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  button:hover { background: var(--border); }
  button:active { transform: scale(0.97); }
  button.danger { border-color: var(--danger); color: var(--danger); }

  /* ── MAP AREA ── */
  .map-scroll {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
    background: #111114;
  }
  .map-container {
    position: relative;
    display: inline-block;
    transform-origin: 0 0;
    cursor: crosshair;
    line-height: 0;
  }
  .map-container img {
    display: block;
    max-width: none;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  .map-container svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  .map-container svg .point-handle {
    pointer-events: all;
    cursor: grab;
  }
  .map-container svg .point-handle:active { cursor: grabbing; }

  /* ── FLOATING PANELS ── */
  .panel {
    position: fixed;
    top: 60px; right: 10px;
    width: 220px;
    max-height: calc(100dvh - 80px);
    background: rgba(36,36,43,0.94);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-y: auto;
    z-index: 90;
    font-size: 13px;
  }
  .panel-header {
    padding: 10px 12px;
    font-weight: 700; font-size: 13px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0;
    background: rgba(36,36,43,0.98);
  }
  .segment-item {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(58,58,69,0.4);
    display: flex; align-items: center; gap: 8px;
  }
  .segment-item:last-child { border-bottom: none; }
  .seg-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .seg-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; flex: 1; }
  .seg-dist { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
  .seg-delete { cursor: pointer; color: var(--text-dim); font-size: 14px; padding: 2px; line-height: 1; border: none; background: none; }
  .seg-delete:hover { color: var(--danger); background: none; }

  .key-panel {
    position: fixed;
    bottom: 10px; left: 10px;
    background: rgba(36,36,43,0.94);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 90; font-size: 12px;
  }
  .key-title { font-weight: 700; margin-bottom: 6px; font-size: 12px; }
  .key-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .key-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); flex-shrink: 0; }

  .help-panel {
    position: fixed;
    bottom: 10px; right: 10px;
    background: rgba(36,36,43,0.94);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 90; font-size: 11px;
    color: var(--text-dim); max-width: 180px; line-height: 1.5;
  }
  .help-panel strong { color: var(--text); }

  .zoom-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    background: var(--surface2);
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .panel { width: 170px; right: 6px; }
    .help-panel { display: none; }
    button { padding: 5px 9px; font-size: 12px; }
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><span>◉</span> Round Valley Campsite</div>
  <div class="header-actions">
    <span class="zoom-display" id="zoomDisplay">100%</span>
    <button onclick="zoomTo(zoom * 1.3)">+</button>
    <button onclick="zoomTo(zoom / 1.3)">−</button>
    <button onclick="zoomTo(1)">1:1</button>
    <button onclick="fitToScreen()">Fit</button>
    <button onclick="undo()">Undo</button>
    <button class="danger" onclick="clearAll()">Clear</button>
  </div>
</div>

<div class="map-scroll" id="mapScroll">
  <div class="map-container" id="mapContainer">
    <img id="mapImg" src="img/map.png" alt="Round Valley Campsite Map">
    <svg id="overlaySvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="panel">
  <div class="panel-header">Segments <span style="color:var(--text-dim);font-weight:400" id="segCount">0</span></div>
  <div id="segmentList"></div>
</div>

<div class="key-panel">
  <div class="key-title">CAMPSITE KEY</div>
  <div class="key-row"><div class="key-swatch" style="background:#4a90d9"></div> Available</div>
  <div class="key-row"><div class="key-swatch" style="background:#e8e6e1"></div> Occupied</div>
  <div class="key-row"><div class="key-swatch" style="background:#2a2a2a"></div> No Waterfront</div>
</div>

<div class="help-panel">
  <strong>Click</strong> to place points<br>
  <strong>Drag</strong> a point to move it<br>
  <strong>Scroll</strong> to pan<br>
  <strong>+/−</strong> to zoom
</div>

<script>
const SCALE = 4.13; // ft per pixel
const COLORS = ['#5ba4f5','#f5a05b','#6bf5a0','#f55b8a','#c49bf5','#f5e65b','#5bf5e6','#f57b5b'];

const mapImg = document.getElementById('mapImg');
const mapContainer = document.getElementById('mapContainer');
const mapScroll = document.getElementById('mapScroll');
const svg = document.getElementById('overlaySvg');
const segmentList = document.getElementById('segmentList');
const segCountEl = document.getElementById('segCount');
const zoomDisplay = document.getElementById('zoomDisplay');

let zoom = 1;
let points = [];   // { x, y, label }  — coords in image pixels
let historyStack = [];
let nextLabel = 0;
let draggingIdx = -1;
let dragMoved = false;

// ── LABELS ──
function makeLabel(i) {
  let s = '', n = i;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}

// ── ZOOM ──
function zoomTo(z) {
  z = Math.min(5, Math.max(0.05, z));
  const scrollEl = mapScroll;
  // Keep center in view
  const cx = (scrollEl.scrollLeft + scrollEl.clientWidth / 2) / zoom;
  const cy = (scrollEl.scrollTop + scrollEl.clientHeight / 2) / zoom;
  zoom = z;
  mapContainer.style.transform = `scale(${zoom})`;
  zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  // Restore center
  requestAnimationFrame(() => {
    scrollEl.scrollLeft = cx * zoom - scrollEl.clientWidth / 2;
    scrollEl.scrollTop = cy * zoom - scrollEl.clientHeight / 2;
  });
}

function fitToScreen() {
  const sw = mapScroll.clientWidth, sh = mapScroll.clientHeight;
  const iw = mapImg.naturalWidth, ih = mapImg.naturalHeight;
  if (!iw || !ih) return;
  const z = Math.min(sw / iw, sh / ih) * 0.98;
  zoom = z;
  mapContainer.style.transform = `scale(${zoom})`;
  zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  requestAnimationFrame(() => {
    mapScroll.scrollLeft = (iw * zoom - sw) / 2;
    mapScroll.scrollTop = (ih * zoom - sh) / 2;
  });
}

mapImg.addEventListener('load', () => {
  svg.setAttribute('viewBox', `0 0 ${mapImg.naturalWidth} ${mapImg.naturalHeight}`);
  fitToScreen();
});

// If already cached
if (mapImg.complete && mapImg.naturalWidth) {
  svg.setAttribute('viewBox', `0 0 ${mapImg.naturalWidth} ${mapImg.naturalHeight}`);
  requestAnimationFrame(fitToScreen);
}

// ── DISTANCE ──
function pxDist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
function fmtDist(px) {
  const ft = px * SCALE;
  if (ft >= 5280) return (ft / 5280).toFixed(2) + ' mi';
  if (ft >= 100) return ft.toFixed(0) + ' ft';
  return ft.toFixed(1) + ' ft';
}

// ── STATE ──
function saveState() { historyStack.push(JSON.stringify(points)); if (historyStack.length > 50) historyStack.shift(); }
function undo() {
  if (!historyStack.length) return;
  points = JSON.parse(historyStack.pop());
  nextLabel = points.length;
  renderOverlay(); updatePanel();
}
function clearAll() {
  if (!points.length) return;
  saveState(); points = []; nextLabel = 0; renderOverlay(); updatePanel();
}

// ── SVG RENDERING ──
function renderOverlay() {
  let html = '';
  const PR = 1 / zoom; // scale-independent sizes
  const r = Math.max(8, 8 / zoom);
  const fontSize = Math.max(13, 13 / zoom);
  const lineW = Math.max(2.5, 2.5 / zoom);
  const dashLen = Math.max(6, 6 / zoom);
  const dashGap = Math.max(4, 4 / zoom);
  const labelFontSize = Math.max(12, 12 / zoom);
  const bgPadX = Math.max(6, 6 / zoom);
  const bgPadY = Math.max(4, 4 / zoom);
  const bgH = labelFontSize + bgPadY * 2;

  // Draw segments (paired points)
  for (let i = 0; i + 1 < points.length; i += 2) {
    const a = points[i], b = points[i + 1];
    const si = i / 2;
    const col = COLORS[si % COLORS.length];
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const d = fmtDist(pxDist(a, b));

    // Dashed line
    html += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
      stroke="${col}" stroke-width="${lineW}" stroke-dasharray="${dashLen} ${dashGap}" />`;

    // Distance badge
    const tw = d.length * labelFontSize * 0.62;
    const bw = tw + bgPadX * 2;
    html += `<rect x="${mx - bw/2}" y="${my - bgH/2}" width="${bw}" height="${bgH}" rx="${Math.max(4, 4/zoom)}"
      fill="rgba(26,26,31,0.88)" />`;
    html += `<text x="${mx}" y="${my}" text-anchor="middle" dominant-baseline="central"
      fill="${col}" font-family="JetBrains Mono, monospace" font-weight="600"
      font-size="${labelFontSize}">${d}</text>`;
  }

  // Draw all points
  points.forEach((p, i) => {
    const si = Math.floor(i / 2);
    const col = COLORS[si % COLORS.length];

    // Glow
    html += `<circle cx="${p.x}" cy="${p.y}" r="${r + r * 0.5}" fill="${col}" opacity="0.2" />`;
    // Dot
    html += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${col}" stroke="#fff" stroke-width="${Math.max(2, 2/zoom)}" />`;
    // Label above
    html += `<text x="${p.x}" y="${p.y - r - Math.max(6, 6/zoom)}" text-anchor="middle" dominant-baseline="auto"
      fill="#fff" font-family="JetBrains Mono, monospace" font-weight="600"
      font-size="${fontSize}">${p.label}</text>`;
    // Invisible larger hit area for dragging
    html += `<circle class="point-handle" data-idx="${i}" cx="${p.x}" cy="${p.y}" r="${r * 2.5}"
      fill="transparent" />`;
  });

  // "click to end" hint for unpaired point
  if (points.length % 2 === 1) {
    const p = points[points.length - 1];
    html += `<text x="${p.x + r * 2}" y="${p.y}" dominant-baseline="central"
      fill="rgba(232,230,225,0.5)" font-family="DM Sans, sans-serif" font-weight="500"
      font-size="${fontSize}">click to end segment</text>`;
  }

  svg.innerHTML = html;
}

// ── CLICK TO PLACE ──
mapContainer.addEventListener('pointerdown', (e) => {
  // Check if it's a point handle
  const handle = e.target.closest('.point-handle');
  if (handle) {
    draggingIdx = parseInt(handle.dataset.idx);
    dragMoved = false;
    e.preventDefault();
    mapContainer.setPointerCapture(e.pointerId);
    return;
  }
  draggingIdx = -1;
  dragMoved = false;
});

mapContainer.addEventListener('pointermove', (e) => {
  if (draggingIdx < 0) return;
  e.preventDefault();
  dragMoved = true;

  const rect = mapImg.getBoundingClientRect();
  const x = (e.clientX - rect.left) / zoom;
  const y = (e.clientY - rect.top) / zoom;

  points[draggingIdx].x = Math.max(0, Math.min(mapImg.naturalWidth, x));
  points[draggingIdx].y = Math.max(0, Math.min(mapImg.naturalHeight, y));
  renderOverlay();
  updatePanel();
});

mapContainer.addEventListener('pointerup', (e) => {
  if (draggingIdx >= 0 && dragMoved) {
    // Finished dragging
    draggingIdx = -1;
    return;
  }
  draggingIdx = -1;

  // Check if click was on a handle (not a new point)
  if (e.target.closest('.point-handle')) return;

  // Place new point
  const rect = mapImg.getBoundingClientRect();
  const x = (e.clientX - rect.left) / zoom;
  const y = (e.clientY - rect.top) / zoom;

  if (x < 0 || y < 0 || x > mapImg.naturalWidth || y > mapImg.naturalHeight) return;

  saveState();
  points.push({ x, y, label: makeLabel(nextLabel++) });
  renderOverlay();
  updatePanel();
});

// ── PANEL ──
function updatePanel() {
  let html = '';
  let segIdx = 0;
  for (let i = 0; i + 1 < points.length; i += 2) {
    const a = points[i], b = points[i + 1];
    const col = COLORS[segIdx % COLORS.length];
    const d = fmtDist(pxDist(a, b));
    const si = segIdx;
    html += `<div class="segment-item">
      <div class="seg-color" style="background:${col}"></div>
      <div class="seg-label">${a.label}→${b.label}</div>
      <div class="seg-dist">${d}</div>
      <button class="seg-delete" onclick="deleteSegment(${si})" title="Delete">✕</button>
    </div>`;
    segIdx++;
  }
  if (points.length % 2 === 1) {
    const p = points[points.length - 1];
    const col = COLORS[segIdx % COLORS.length];
    html += `<div class="segment-item" style="opacity:0.5">
      <div class="seg-color" style="background:${col}"></div>
      <div class="seg-label">${p.label}→?</div>
      <div class="seg-dist">…</div>
      <button class="seg-delete" onclick="deleteSegment(${segIdx})" title="Delete">✕</button>
    </div>`;
  }
  if (!html) html = '<div style="padding:12px;color:var(--text-dim);text-align:center;font-size:12px">Click the map to place points</div>';
  segmentList.innerHTML = html;
  segCountEl.textContent = Math.floor(points.length / 2);
}

window.deleteSegment = function(si) {
  saveState();
  const start = si * 2;
  const count = (start + 1 < points.length) ? 2 : 1;
  points.splice(start, count);
  points.forEach((p, i) => p.label = makeLabel(i));
  nextLabel = points.length;
  renderOverlay(); updatePanel();
};

// ── KEYBOARD ZOOM ──
document.addEventListener('keydown', (e) => {
  if (e.key === '=' || e.key === '+') zoomTo(zoom * 1.2);
  if (e.key === '-') zoomTo(zoom / 1.2);
  if (e.key === '0') fitToScreen();
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
});

// Init
updatePanel();
</script>
</body>
</html>
