<!DOCTYPE html>
<p> Im the Goat at ts</p>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>Round Valley Campsite — Distance Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1f;
    --surface: #24242b;
    --surface2: #2e2e37;
    --border: #3a3a45;
    --text: #e8e6e1;
    --text-dim: #8a8890;
    --accent: #5ba4f5;
    --danger: #f55b5b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    -webkit-user-select: none;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
    gap: 8px;
    flex-wrap: wrap;
  }
  .header-title { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; white-space: nowrap; }
  .header-title span { color: var(--accent); }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  button {
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  button:hover { background: var(--border); }
  button:active { transform: scale(0.97); }
  button.danger { border-color: var(--danger); color: var(--danger); }
  button.danger:hover { background: rgba(245,91,91,0.12); }

  .canvas-wrap { flex: 1; position: relative; overflow: hidden; touch-action: none; }
  canvas { position: absolute; top: 0; left: 0; image-rendering: auto; }

  .panel {
    position: absolute;
    top: 8px; right: 8px;
    width: 220px;
    max-height: calc(100dvh - 120px);
    background: rgba(36,36,43,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-y: auto;
    z-index: 50;
    font-size: 13px;
  }
  .panel-header {
    padding: 10px 12px;
    font-weight: 700; font-size: 13px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0;
    background: rgba(36,36,43,0.98);
    z-index: 2;
  }
  .segment-item {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(58,58,69,0.5);
    display: flex; align-items: center; gap: 8px;
  }
  .segment-item:last-child { border-bottom: none; }
  .seg-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .seg-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; flex: 1; }
  .seg-dist { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
  .seg-delete { cursor: pointer; color: var(--text-dim); font-size: 14px; padding: 2px; line-height: 1; border: none; background: none; }
  .seg-delete:hover { color: var(--danger); background: none; }

  .key-panel {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(36,36,43,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 50; font-size: 12px;
  }
  .key-title { font-weight: 700; margin-bottom: 6px; font-size: 12px; }
  .key-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .key-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); flex-shrink: 0; }

  .tooltip {
    position: absolute;
    background: rgba(36,36,43,0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    pointer-events: none;
    z-index: 60;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .tooltip.visible { opacity: 1; }

  .instructions {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(36,36,43,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 50; font-size: 11px;
    color: var(--text-dim);
    max-width: 200px; line-height: 1.5;
  }
  .instructions strong { color: var(--text); }

  .zoom-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    background: var(--surface2);
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border);
  }

  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 200;
    font-size: 14px; color: var(--text-dim); gap: 10px;
  }
  .loading-overlay.hidden { display: none; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .panel { width: 180px; right: 6px; top: 6px; font-size: 12px; }
    .instructions { display: none; }
    .header-title { font-size: 13px; }
    button { padding: 5px 9px; font-size: 12px; }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><span>◉</span> Round Valley Campsite</div>
  <div class="header-actions">
    <span class="zoom-display" id="zoomDisplay">100%</span>
    <button id="btnZoomIn" title="Zoom in">+</button>
    <button id="btnZoomOut" title="Zoom out">−</button>
    <button id="btnFit">Fit</button>
    <button id="btnUndo">Undo</button>
    <button class="danger" id="btnClearAll">Clear</button>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="mainCanvas"></canvas>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    Loading map…
  </div>

  <div class="panel" id="segmentPanel">
    <div class="panel-header">
      Segments
      <span style="color:var(--text-dim);font-weight:400" id="segCount">0</span>
    </div>
    <div id="segmentList"></div>
  </div>

  <div class="key-panel">
    <div class="key-title">CAMPSITE KEY</div>
    <div class="key-row"><div class="key-swatch" style="background:#4a90d9"></div> Available</div>
    <div class="key-row"><div class="key-swatch" style="background:#e8e6e1"></div> Occupied</div>
    <div class="key-row"><div class="key-swatch" style="background:#2a2a2a"></div> No Waterfront</div>
  </div>

  <div class="instructions">
    <strong>Click</strong> to place points<br>
    <strong>Drag</strong> a point to move it<br>
    <strong>Pairs</strong> form segments<br>
    <strong>Pinch/Scroll</strong> to zoom<br>
    <strong>Two-finger</strong> to pan
  </div>

  <div class="tooltip" id="tooltip"></div>
</div>

<script>
const SCALE = 4.13;
const COLORS = ['#5ba4f5','#f5a05b','#6bf5a0','#f55b8a','#c49bf5','#f5e65b','#5bf5e6','#f57b5b'];

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const tooltip = document.getElementById('tooltip');
const segmentList = document.getElementById('segmentList');
const segCount = document.getElementById('segCount');
const zoomDisplay = document.getElementById('zoomDisplay');
const loadingOverlay = document.getElementById('loadingOverlay');

let img = null, imgW = 0, imgH = 0;
let view = { x: 0, y: 0, scale: 1 };
let points = [], history = [], nextLabel = 0;
let dragging = null, dragStarted = false, pointerDown = false;
let panStart = null, pinchStartDist = null, pinchStartScale = null;
let lastPointers = new Map();

function label(i) {
  let s = '', n = i;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}

function getSegments() {
  const segs = [];
  for (let i = 0; i < points.length; i += 2)
    if (i + 1 < points.length) segs.push({ a: points[i], b: points[i+1], index: i/2 });
  return segs;
}

function pxDist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

function fmtDist(px) {
  const ft = px * SCALE;
  if (ft >= 5280) return (ft / 5280).toFixed(2) + ' mi';
  if (ft >= 100) return ft.toFixed(0) + ' ft';
  return ft.toFixed(1) + ' ft';
}

function saveState() { history.push(JSON.stringify(points)); if (history.length > 50) history.shift(); }
function undo() { if (!history.length) return; points = JSON.parse(history.pop()); nextLabel = points.length; render(); updatePanel(); }

function screenToImg(sx, sy) {
  const r = canvas.getBoundingClientRect();
  return { x: (sx - r.left - view.x) / view.scale, y: (sy - r.top - view.y) / view.scale };
}
function imgToScreen(ix, iy) { return { x: ix * view.scale + view.x, y: iy * view.scale + view.y }; }

function resizeCanvas() {
  const r = window.devicePixelRatio || 1, w = wrap.clientWidth, h = wrap.clientHeight;
  canvas.width = w * r; canvas.height = h * r;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(r, 0, 0, r, 0, 0);
}

function hexRgba(hex, a) {
  const h = hex.replace('#','');
  return `rgba(${parseInt(h.substring(0,2),16)},${parseInt(h.substring(2,4),16)},${parseInt(h.substring(4,6),16)},${a})`;
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

function render() {
  resizeCanvas();
  const w = wrap.clientWidth, h = wrap.clientHeight;
  ctx.clearRect(0,0,w,h); ctx.fillStyle = '#111114'; ctx.fillRect(0,0,w,h);
  if (!img) return;

  ctx.save(); ctx.translate(view.x, view.y); ctx.scale(view.scale, view.scale);
  ctx.drawImage(img, 0, 0); ctx.restore();

  const segs = getSegments();
  segs.forEach((seg, si) => {
    const col = COLORS[si % COLORS.length];
    const a = imgToScreen(seg.a.x, seg.a.y), b = imgToScreen(seg.b.x, seg.b.y);

    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);

    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2, d = fmtDist(pxDist(seg.a, seg.b));
    ctx.font = '600 12px "JetBrains Mono", monospace';
    const tw = ctx.measureText(d).width;
    ctx.fillStyle = 'rgba(26,26,31,0.85)'; roundRect(ctx, mx-tw/2-6, my-9, tw+12, 18, 4); ctx.fill();
    ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(d, mx, my);
  });

  points.forEach((p, i) => {
    const col = COLORS[Math.floor(i/2) % COLORS.length];
    const s = imgToScreen(p.x, p.y), r = dragging === i ? 9 : 7;

    ctx.beginPath(); ctx.arc(s.x,s.y,r+4,0,Math.PI*2); ctx.fillStyle = hexRgba(col,0.2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    ctx.font = '600 11px "JetBrains Mono", monospace';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.label, s.x, s.y - r - 10);
  });

  if (points.length % 2 === 1) {
    const s = imgToScreen(points[points.length-1].x, points[points.length-1].y);
    ctx.font = '500 11px "DM Sans", sans-serif'; ctx.fillStyle = 'rgba(232,230,225,0.6)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('click to end segment', s.x+14, s.y);
  }
  zoomDisplay.textContent = Math.round(view.scale * 100) + '%';
}

function updatePanel() {
  const segs = getSegments();
  segCount.textContent = segs.length;
  let html = '';
  segs.forEach((seg, si) => {
    const col = COLORS[si % COLORS.length], d = fmtDist(pxDist(seg.a, seg.b));
    html += `<div class="segment-item"><div class="seg-color" style="background:${col}"></div>
      <div class="seg-label">${seg.a.label}→${seg.b.label}</div>
      <div class="seg-dist">${d}</div>
      <button class="seg-delete" onclick="deleteSegment(${si})" title="Delete">✕</button></div>`;
  });
  if (points.length % 2 === 1) {
    const p = points[points.length-1], si = Math.floor(points.length/2), col = COLORS[si % COLORS.length];
    html += `<div class="segment-item" style="opacity:0.5"><div class="seg-color" style="background:${col}"></div>
      <div class="seg-label">${p.label}→?</div><div class="seg-dist">…</div>
      <button class="seg-delete" onclick="deleteSegment(${si})" title="Delete">✕</button></div>`;
  }
  if (!html) html = '<div style="padding:12px;color:var(--text-dim);text-align:center;font-size:12px">Click the map to place points</div>';
  segmentList.innerHTML = html;
}

window.deleteSegment = function(si) {
  saveState(); const s = si*2; points.splice(s, s+1 < points.length ? 2 : 1);
  points.forEach((p,i) => p.label = label(i)); nextLabel = points.length; render(); updatePanel();
};

function hitPoint(sx, sy) {
  for (let i = points.length-1; i >= 0; i--) {
    const s = imgToScreen(points[i].x, points[i].y);
    if ((s.x-sx)**2+(s.y-sy)**2 < 18*18) return i;
  }
  return -1;
}

function onPointerDown(e) {
  if (!img) return;
  lastPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (lastPointers.size === 2) {
    const pts = [...lastPointers.values()];
    pinchStartDist = pxDist(pts[0], pts[1]); pinchStartScale = view.scale; dragging = null; return;
  }
  const hit = hitPoint(e.clientX, e.clientY);
  if (hit >= 0) { dragging = hit; dragStarted = false; pointerDown = true; canvas.setPointerCapture(e.pointerId); return; }
  pointerDown = true; panStart = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y }; dragStarted = false;
  canvas.setPointerCapture(e.pointerId);
}

function onPointerMove(e) {
  if (!img) return;
  lastPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (lastPointers.size === 2 && pinchStartDist) {
    const pts = [...lastPointers.values()], d = pxDist(pts[0], pts[1]);
    const ns = Math.min(10, Math.max(0.1, pinchStartScale * (d/pinchStartDist)));
    const cx = (pts[0].x+pts[1].x)/2, cy = (pts[0].y+pts[1].y)/2, r = canvas.getBoundingClientRect();
    zoomAt(cx-r.left, cy-r.top, ns); return;
  }
  if (!pointerDown) {
    const hit = hitPoint(e.clientX, e.clientY);
    if (hit >= 0) {
      tooltip.textContent = `${points[hit].label}: (${Math.round(points[hit].x)}, ${Math.round(points[hit].y)})`;
      tooltip.style.left = (e.clientX-canvas.getBoundingClientRect().left+12)+'px';
      tooltip.style.top = (e.clientY-canvas.getBoundingClientRect().top-12)+'px';
      tooltip.classList.add('visible'); canvas.style.cursor = 'grab';
    } else { tooltip.classList.remove('visible'); canvas.style.cursor = 'crosshair'; }
    return;
  }
  if (dragging !== null) {
    dragStarted = true; const ip = screenToImg(e.clientX, e.clientY);
    points[dragging].x = Math.max(0,Math.min(imgW,ip.x));
    points[dragging].y = Math.max(0,Math.min(imgH,ip.y));
    render(); updatePanel(); canvas.style.cursor = 'grabbing'; return;
  }
  if (panStart) {
    const dx = e.clientX-panStart.x, dy = e.clientY-panStart.y;
    if (Math.abs(dx)>3||Math.abs(dy)>3) dragStarted = true;
    view.x = panStart.vx+dx; view.y = panStart.vy+dy; render();
  }
}

function onPointerUp(e) {
  lastPointers.delete(e.pointerId);
  if (lastPointers.size < 2) { pinchStartDist = null; pinchStartScale = null; }
  if (!img) { pointerDown = false; dragging = null; panStart = null; return; }
  if (dragging !== null && dragStarted) { dragging = null; pointerDown = false; render(); return; }
  if (!dragStarted && dragging === null) {
    const ip = screenToImg(e.clientX, e.clientY);
    if (ip.x >= 0 && ip.x <= imgW && ip.y >= 0 && ip.y <= imgH) {
      saveState(); points.push({ x: ip.x, y: ip.y, label: label(nextLabel++) }); render(); updatePanel();
    }
  }
  dragging = null; pointerDown = false; panStart = null; canvas.style.cursor = 'crosshair';
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointercancel', onPointerUp);

function zoomAt(cx, cy, ns) {
  const r = ns/view.scale; view.x = cx-r*(cx-view.x); view.y = cy-r*(cy-view.y); view.scale = ns; render();
}

canvas.addEventListener('wheel', (e) => {
  e.preventDefault(); if (!img) return;
  const r = canvas.getBoundingClientRect(), f = e.deltaY > 0 ? 0.9 : 1.1;
  zoomAt(e.clientX-r.left, e.clientY-r.top, Math.min(10, Math.max(0.1, view.scale*f)));
}, { passive: false });

document.getElementById('btnZoomIn').addEventListener('click', () => { if(img) zoomAt(wrap.clientWidth/2, wrap.clientHeight/2, Math.min(10, view.scale*1.3)); });
document.getElementById('btnZoomOut').addEventListener('click', () => { if(img) zoomAt(wrap.clientWidth/2, wrap.clientHeight/2, Math.max(0.1, view.scale/1.3)); });

function fitImage() {
  if (!img) return;
  const panel = document.getElementById('segmentPanel');
  const panelW = panel ? panel.offsetWidth + 16 : 0;   // panel + gap
  const keyPanel = document.querySelector('.key-panel');
  const keyW = keyPanel ? keyPanel.offsetWidth + 16 : 0;
  const usableW = wrap.clientWidth - panelW - keyW;
  const usableH = wrap.clientHeight - 16;
  const s = Math.min(usableW / imgW, usableH / imgH) * 0.95;
  view.scale = s;
  view.x = keyW + (usableW - imgW * s) / 2;
  view.y = (wrap.clientHeight - imgH * s) / 2;
  render();
}

document.getElementById('btnFit').addEventListener('click', fitImage);
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnClearAll').addEventListener('click', () => { if(!points.length) return; saveState(); points=[]; nextLabel=0; render(); updatePanel(); });

// ── AUTO-LOAD map.png ──
(function() {
  resizeCanvas(); render(); updatePanel();
  const i = new Image();
  i.onload = () => { img = i; imgW = i.width; imgH = i.height; loadingOverlay.classList.add('hidden'); fitImage(); };
  i.onerror = () => {
    loadingOverlay.innerHTML = '<div style="text-align:center;color:var(--danger);padding:24px;line-height:1.6">Could not load <strong style="color:var(--text)">map.png</strong><br><span style="font-size:12px;color:var(--text-dim)">Place map.png in the same folder as this HTML file.</span></div>';
  };
  i.src = 'img/map.png';
})();

window.addEventListener('resize', () => { if (img) render(); });
</script>
</body>
</html>
